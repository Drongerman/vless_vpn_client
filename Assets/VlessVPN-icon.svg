<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" preserveAspectRatio="xMidYMid meet" role="img" aria-label="VlessVPN">
  <defs>
    <linearGradient id="shieldFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F1923"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00D9FF"/>
      <stop offset="100%" stop-color="#2EA043"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Фон на весь квадрат (обрезка ОС по кругу не «сжимает» содержимое) -->
  <rect width="512" height="512" rx="96" fill="#0D1117"/>
  <!-- Чуть шире по X чем по Y — в мелких размерах не выглядит «зауженным» по ширине -->
  <g transform="translate(256 256) scale(0.96 0.86) translate(-256 -256)">
    <path fill="url(#shieldFill)" stroke="url(#accent)" stroke-width="6"
          d="M256 72 L396 132 V268 C396 360 320 420 256 448 C192 420 116 360 116 268 V132 Z"/>
    <path fill="none" stroke="#00D9FF" stroke-width="2" opacity="0.35"
          d="M256 96 L372 146 V262 C372 340 310 392 256 416 C202 392 140 340 140 262 V146 Z"/>
    <circle cx="200" cy="220" r="14" fill="#00D9FF" filter="url(#glow)"/>
    <circle cx="312" cy="220" r="14" fill="#2EA043" filter="url(#glow)"/>
    <circle cx="256" cy="290" r="16" fill="#00D9FF"/>
    <path d="M200 220 L256 290 L312 220" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <path fill="none" stroke="#E6EDF3" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"
          d="M220 170 L256 240 L292 170"/>
  </g>
</svg>
